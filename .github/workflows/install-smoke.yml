name: Install smoke

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  workflow_run:
    workflows: ["Publish to PyPI"]
    types: [completed]

permissions:
  contents: read

jobs:
  editable-smoke:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    name: editable / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run editable install smoke
        run: python tests/smoke/run_install_smoke.py --mode editable

  artifact-smoke:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    name: ${{ matrix.artifact }} / ubuntu-latest / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        artifact: [wheel, sdist]
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run ${{ matrix.artifact }} install smoke
        run: python tests/smoke/run_install_smoke.py --mode ${{ matrix.artifact }}

  pypi-smoke:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    name: pypi / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run PyPI install smoke
        run: python tests/smoke/run_install_smoke.py --mode pypi
