# SECURITY: do not add `pull_request` to this workflow. A self-hosted runner
# attached to a public repo would execute arbitrary code from fork PRs.

name: E2E nightly (main)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run regardless of SHA cache"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  guard:
    name: Resolve stale main target
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.diff.outputs.should_run }}
      target_sha: ${{ steps.resolve.outputs.target_sha }}
      cache_hit: ${{ steps.cache-target.outputs.cache-hit }}
    steps:
      - id: resolve
        name: Resolve current main SHA
        run: |
          set -euo pipefail
          TARGET_SHA=$(git ls-remote https://github.com/LibreYOLO/libreyolo refs/heads/main | cut -f1)
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved: main=$TARGET_SHA"

      - id: cache-target
        uses: actions/cache@v4
        with:
          path: .last-main
          key: last-tested-nightly-main-${{ steps.resolve.outputs.target_sha }}

      - id: diff
        name: Decide whether main needs testing
        env:
          FORCE: ${{ inputs.force }}
          HIT_TARGET: ${{ steps.cache-target.outputs.cache-hit }}
        run: |
          set -euo pipefail
          if [ "${FORCE:-false}" = "true" ]; then
            SHOULD_RUN=true
          elif [ "${HIT_TARGET:-}" = "true" ]; then
            SHOULD_RUN=false
          else
            SHOULD_RUN=true
          fi
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "Should run main: $SHOULD_RUN"

  e2e:
    name: e2e (main)
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: [self-hosted, gpu, libreyolo-e2e]
    timeout-minutes: 180
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - uses: astral-sh/setup-uv@v4

      - name: Create venv
        run: uv venv --python 3.10

      - name: Install from source
        run: uv pip install --no-sources --torch-backend cu128 --group dev -e ".[rfdetr,onnx]"

      - name: GPU sanity
        run: uv run --no-sync python -c "import torch; print('CUDA:', torch.cuda.is_available(), torch.cuda.get_device_name(0) if torch.cuda.is_available() else '-')"

      - name: Record nightly suite contract
        shell: bash
        run: |
          set -euo pipefail
          if [ -f tests/e2e/nightly_contract.py ]; then
            uv run --no-sync python - <<'PY'
          import os
          from pathlib import Path

          from tests.e2e.nightly_contract import (
              nightly_markdown_summary,
              nightly_summary_line,
          )

          print(nightly_summary_line())
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with Path(summary_path).open("a", encoding="utf-8") as f:
                  f.write(nightly_markdown_summary())
                  f.write("\n")
          PY
          else
            msg="LibreYOLO nightly e2e suite: legacy pre-v1.0 (checked-out target has no versioned contract)"
            echo "$msg"
            if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
              {
                echo "### $msg"
                echo
                echo "This target predates the versioned nightly test contract."
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Run e2e
        shell: bash
        run: |
          set -euo pipefail
          if grep -q '^test_nightly:' Makefile; then
            make test_nightly
          else
            echo "test_nightly target not present; running legacy pre-v1.0 e2e command"
            uv run --no-sync pytest tests/e2e -v -m "not export_backend"
          fi

      - name: Mark main as tested
        if: success()
        run: echo "ok ${{ github.run_id }}" > .last-main

      - name: Save tested-SHA cache
        if: success() && needs.guard.outputs.cache_hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .last-main
          key: last-tested-nightly-main-${{ needs.guard.outputs.target_sha }}
